<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .detail-item:last-child {
            border-bottom: none;
        }
        .label {
            color: #666;
            font-weight: 600;
        }
        .value {
            color: #333;
            font-weight: 500;
            max-width: 60%;
            text-align: right;
            word-break: break-all;
        }
        .loading {
            color: #999;
            font-style: italic;
        }
        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Your Details</h1>
        
        <div class="detail-item">
            <span class="label">IP Address</span>
            <span class="value loading" id="ip">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Country</span>
            <span class="value loading" id="country">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Region</span>
            <span class="value loading" id="region">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">City</span>
            <span class="value loading" id="city">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Latitude</span>
            <span class="value loading" id="lat">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Longitude</span>
            <span class="value loading" id="lng">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Timezone</span>
            <span class="value loading" id="timezone">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Browser</span>
            <span class="value loading" id="browser">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">OS</span>
            <span class="value loading" id="os">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Device</span>
            <span class="value loading" id="device">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Screen</span>
            <span class="value loading" id="screen">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">Language</span>
            <span class="value loading" id="lang">Detecting...</span>
        </div>
        
        <div class="detail-item">
            <span class="label">ISP/Org</span>
            <span class="value loading" id="isp">Detecting...</span>
        </div>
        
        <div id="error-container"></div>
    </div>

    <script>
        // Detect browser, OS, device
        const ua = navigator.userAgent;
        
        let browser = 'Unknown';
        if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Opera') || ua.includes('OPR')) browser = 'Opera';
        else if (ua.includes('Edg')) browser = 'Edge';
        else if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('MSIE') || ua.includes('Trident')) browser = 'Internet Explorer';

        let os = 'Unknown';
        if (ua.includes('Windows')) os = 'Windows';
        else if (ua.includes('Mac OS')) os = 'macOS';
        else if (ua.includes('Linux')) os = 'Linux';
        else if (ua.includes('Android')) os = 'Android';
        else if (ua.includes('iOS') || ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';

        let device = 'Desktop';
        if (/Mobi|Android|iPhone|iPad|iPod/.test(ua)) device = 'Mobile';
        else if (/Tablet|iPad/.test(ua)) device = 'Tablet';

        document.getElementById('browser').textContent = browser;
        document.getElementById('os').textContent = os;
        document.getElementById('device').textContent = device;
        document.getElementById('screen').textContent = window.screen.width + ' × ' + window.screen.height;
        document.getElementById('lang').textContent = navigator.language || 'Unknown';

        // Fetch IP and geolocation info
        Promise.all([
            fetch('https://ipapi.co/json/').then(r => r.ok ? r.json() : Promise.reject('ipapi failed')),
            navigator.geolocation.getCurrentPosition(
                p => ({ lat: p.coords.latitude, lng: p.coords.longitude }),
                () => null,
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            ).catch(() => null)
        ]).then(([ipData, geoData]) => {
            if (ipData) {
                document.getElementById('ip').textContent = ipData.ip || '—';
                document.getElementById('country').textContent = ipData.country_name || '—';
                document.getElementById('region').textContent = ipData.region || '—';
                document.getElementById('city').textContent = ipData.city || '—';
                document.getElementById('timezone').textContent = ipData.timezone || '—';
                document.getElementById('isp').textContent = ipData.org || '—';
                if (!geoData) {
                    document.getElementById('lat').textContent = ipData.latitude || '—';
                    document.getElementById('lng').textContent = ipData.longitude || '—';
                }
            }
            if (geoData) {
                document.getElementById('lat').textContent = geoData.lat.toFixed(4);
                document.getElementById('lng').textContent = geoData.lng.toFixed(4);
            }
        }).catch(err => {
            console.error('Error fetching details:', err);
            document.getElementById('error-container').innerHTML = 
                '<div class="error">⚠️ Some details could not be fetched. Please check your connection.</div>';
            document.getElementById('ip').textContent = 'Unavailable';
            document.getElementById('country').textContent = 'Unavailable';
            document.getElementById('region').textContent = 'Unavailable';
            document.getElementById('city').textContent = 'Unavailable';
            document.getElementById('timezone').textContent = 'Unavailable';
            document.getElementById('isp').textContent = 'Unavailable';
        });
    </script>
</body>
</html>
